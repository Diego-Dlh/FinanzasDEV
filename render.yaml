databases:
  - name: finanzasdev-db
    databaseName: finanzasdev
    user: finanzasdev
    plan: free
    region: oregon

services:
  - type: web
    name: finanzasdev
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finanzasdev-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
